name: CI-CD Pipeline
# Trigger condition for pipeline
on:
  push:
    branches: [ "master" ]
    
permissions:
  contents: write
jobs:
  compile:
    # It refers to the shared runner VM provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # On runner, it creates a local copy of the repo and checkout the code
    - uses: actions/checkout@v4
    - name: Set up JDK 17
    # Here, set-up env for JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile #mvn -B package --file pom.xml

  security-check:
    # It refers to the shared runner VM provided by GitHub
    runs-on: ubuntu-latest
    needs: compile
    
    steps:
    # On runner, it creates a local copy of the repo and checkout the code
    - uses: actions/checkout@v4
    - name: Trivy Fs Scan
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
        
    # Trivy FileSystem Scan
    - name: Trivy Fs Scan
      run: trivy fs --format table -o fs-report.json .

    - name: gitleaks Installation
      run: sudo apt install gitleaks -y

    - name: Gitleaks Code Scan
      run: gitleaks detect source . -r gitleaks-report.json -f json

  test:
    # It refers to the shared runner VM provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # On runner, it creates a local copy of the repo and checkout the code
    - uses: actions/checkout@v4
    - name: Set up JDK 17
    # Here, set-up env for JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Unit Test cases
      run: mvn test

    # Sonar Qube Analysis
    # used static analysis solutions for continuous code quality, security inspection, and fix remediation. 
  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
    # Here, set-up env for JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build Project
      run: mvn clean verify #mvn -B package --file pom.xml
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v8.0.0 # Ex: v4.1.0, or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  # Check the Quality Gate status.
    - name: SonarQube Quality Gate check
      id: sonarqube-quality-gate-check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} #OPTIONAL
      
